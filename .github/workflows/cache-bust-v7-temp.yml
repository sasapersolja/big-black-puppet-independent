name: One-commit cache bust v7

on:
  push:
    branches:
      - cache-bust-v7-temp

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Create versioned stylesheet and update references
        shell: bash
        run: |
          set -euo pipefail
          cp styles-v6.css styles-v7.css
          sed -i 's#/styles-v6.css#/styles-v7.css#g' index.html
          test "$(cmp -s styles-v6.css styles-v7.css; echo $?)" = "0"
          test "$(grep -c '/styles-v7.css' index.html)" = "2"
          test "$(grep -c '/styles-v6.css' index.html || true)" = "0"

      - name: Commit exactly once to main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add styles-v7.css index.html
          git commit -m "Cache-bust experimental hero stylesheet"
          git push origin HEAD:main
