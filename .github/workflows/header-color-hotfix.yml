name: Apply header color cache bust

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/header-color-hotfix.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Update stylesheet references only
        run: |
          sed -i 's#/styles-v5.css#/styles-v6.css#g' index.html
          rm .github/workflows/header-color-hotfix.yml
      - name: Commit hotfix
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html .github/workflows/header-color-hotfix.yml
          git commit -m 'Switch to cache-busted orange header stylesheet'
          git push
