name: Remove hero subtitle once

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/remove-hero-subtitle.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Remove exact hero subtitle and workflow
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          target = '        <h2>Featured release: Big Black Puppet</h2>\n'
          if text.count(target) != 1:
              raise SystemExit(f'Expected exactly one target line, found {text.count(target)}')
          path.write_text(text.replace(target, ''), encoding='utf-8')
          PY
          git rm .github/workflows/remove-hero-subtitle.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Remove obsolete hero subtitle markup"
          git push